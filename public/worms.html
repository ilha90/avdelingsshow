<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romkrig — 1v1 Worms</title>
<style>
  :root{
    --p1:#ff4d5e; --p1d:#b3303d; --p2:#4d9bff; --p2d:#2f63b3;
    --gold:#ffcf4d; --bg0:#07071e; --bg1:#0d1640;
    --ink:#e9edff; --muted:#9aa4cf; --panel:#0c1230; --panel2:#141d4d;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#000; overflow:hidden;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; color:var(--ink);
    user-select:none; -webkit-user-select:none; }
  #wrap{ position:fixed; inset:0; display:flex; flex-direction:column; }
  #cv{ display:block; flex:1 1 auto; cursor:crosshair; touch-action:none; }

  /* ---------- Hotbar ---------- */
  #hotbar{ height:68px; flex:0 0 68px; display:flex; align-items:center; gap:8px;
    padding:0 12px; background:linear-gradient(180deg,#0b1130,#070a1f);
    border-top:2px solid #233; box-shadow:0 -6px 24px rgba(0,0,0,.6); }
  #hb-player{ display:flex; flex-direction:column; justify-content:center; min-width:138px;
    padding:0 10px; border-right:1px solid #2a356b; }
  #hb-name{ font-weight:800; font-size:14px; letter-spacing:.3px; }
  #hb-money{ font-size:20px; font-weight:900; color:var(--gold); line-height:1.1; }
  #hb-slots{ display:flex; gap:7px; flex:1 1 auto; overflow-x:auto; padding:4px 2px; }
  .slot{ position:relative; min-width:62px; height:56px; border-radius:11px; cursor:pointer;
    background:#121a40; border:2px solid #243067; display:flex; flex-direction:column;
    align-items:center; justify-content:center; transition:transform .08s,border-color .12s,background .12s; }
  .slot:hover{ transform:translateY(-2px); }
  .slot .ic{ font-size:23px; line-height:1; }
  .slot .nm{ font-size:8.5px; color:var(--muted); margin-top:2px; font-weight:700;
    max-width:58px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .slot .px{ font-size:9px; font-weight:800; color:var(--gold); margin-top:1px; }
  .slot.owned .px{ color:#6fe0a8; }
  .slot.sel{ border-color:var(--gold); background:#1c2552; box-shadow:0 0 0 2px var(--gold) inset, 0 0 14px rgba(255,207,77,.35); }
  .slot.cant{ opacity:.4; filter:grayscale(.7); cursor:not-allowed; }
  .slot .inf{ position:absolute; top:3px; right:5px; font-size:9px; color:#6fe0a8; font-weight:900; }

  /* ---------- Overlays ---------- */
  .overlay{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(4,6,22,.82); backdrop-filter:blur(4px); z-index:40; }
  .overlay.hidden{ display:none; }
  .panel{ background:linear-gradient(160deg,var(--panel2),var(--panel)); border:1px solid #2c3a7d;
    border-radius:20px; padding:26px 30px; width:min(680px,92vw); max-height:88vh; overflow:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.6); }
  .panel h1{ font-size:26px; margin-bottom:4px; }
  .panel h2{ font-size:20px; margin-bottom:14px; }
  .sub{ color:var(--muted); font-size:13px; margin-bottom:16px; }
  .shop-money{ font-size:22px; font-weight:900; color:var(--gold); }
  .shop-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0; }
  .shop-card{ background:#121a40; border:2px solid #243067; border-radius:13px; padding:10px;
    text-align:center; cursor:pointer; transition:transform .08s,border-color .12s; }
  .shop-card:hover{ transform:translateY(-2px); }
  .shop-card.sel{ border-color:var(--gold); box-shadow:0 0 0 2px var(--gold) inset; }
  .shop-card.owned{ border-color:#2f8f5f; }
  .shop-card.cant{ opacity:.45; filter:grayscale(.6); }
  .shop-card .ic{ font-size:30px; }
  .shop-card .nm{ font-weight:800; font-size:13px; margin-top:4px; }
  .shop-card .de{ font-size:10.5px; color:var(--muted); margin-top:3px; min-height:26px; line-height:1.25; }
  .shop-card .px{ font-weight:900; margin-top:6px; color:var(--gold); font-size:13px; }
  .shop-card.owned .px{ color:#6fe0a8; }
  .btn{ border:none; border-radius:12px; padding:12px 26px; font-size:16px; font-weight:800;
    cursor:pointer; color:#fff; background:#2b367a; transition:transform .08s,filter .12s; }
  .btn:hover{ transform:translateY(-2px); filter:brightness(1.12); }
  .btn-go{ background:linear-gradient(135deg,#ffcf4d,#ff9d2f); color:#241a00; }
  .btn-big{ font-size:20px; padding:15px 40px; }
  .center{ text-align:center; }
  .win-emoji{ font-size:64px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hotbar">
    <div id="hb-player">
      <div id="hb-name">Spiller 1</div>
      <div id="hb-money">0 kr</div>
    </div>
    <div id="hb-slots"></div>
  </div>
</div>

<!-- Shop modal -->
<div id="shop" class="overlay hidden">
  <div class="panel">
    <h1 id="shop-title">🛒 Våpenbutikk</h1>
    <div class="sub">Kjøp våpen og velg det aktive før runden. <span class="shop-money" id="shop-money">0 kr</span></div>
    <div class="shop-grid" id="shop-grid"></div>
    <div class="center"><button class="btn btn-go btn-big" id="shop-go">Start tur ▶</button></div>
  </div>
</div>

<!-- Game over -->
<div id="gameover" class="overlay hidden">
  <div class="panel center">
    <div class="win-emoji" id="go-emoji">🏆</div>
    <h1 id="go-title">Spiller 1 vant!</h1>
    <div class="sub" id="go-sub"></div>
    <button class="btn btn-go btn-big" id="go-again">🔄 Nytt spill</button>
  </div>
</div>

<script type="module">
import { createWormsEngine } from './worms-engine.js';

const cv = document.getElementById('cv');
const hbName = document.getElementById('hb-name');
const hbMoney = document.getElementById('hb-money');
const hbSlots = document.getElementById('hb-slots');
const shopEl = document.getElementById('shop');

const TEAMS = [
  { id:0, name:'Spiller 1', col:'#ff4d5e', dark:'#b3303d', cap:'#ffd34d' },
  { id:1, name:'Spiller 2', col:'#4d9bff', dark:'#2f63b3', cap:'#7dffea' }
];

let engine = null;

function startGame(){
  if (engine) engine.dispose();
  engine = createWormsEngine({
    canvas: cv,
    mode: 'local',
    onRefresh: refresh,
    onGameOver: gameOver
  });
  engine.start({
    coins: true,
    teams: TEAMS,
    seed: (Math.random()*1e9)|0,
    worms: [
      { pid:'p0', name:'Spiller 1', team:0, lives:8 },
      { pid:'p1', name:'Spiller 2', team:1, lives:8 }
    ]
  });
  document.getElementById('gameover').classList.add('hidden');
  engine.beginTurnLocal();   // åpner shop for spiller 1
}

/* ---------- Hotbar + shop UI ---------- */
function refresh(){
  if (!engine) return;
  const p = engine.getCurrent(); if (!p) return;
  hbName.textContent = p.name; hbName.style.color = p.col;
  hbMoney.textContent = p.money + ' kr';
  buildSlots(p);
  if (engine.getPhase() === 'shop'){
    shopEl.classList.remove('hidden');
    syncShop(p);
  } else {
    shopEl.classList.add('hidden');
  }
}
function buildSlots(p){
  const W = engine.WEAPONS, ORDER = engine.WEAPON_ORDER;
  hbSlots.innerHTML = '';
  for (const id of ORDER){
    const w = W[id], owned = p.owned.has(id), afford = p.money >= w.price;
    const div = document.createElement('div');
    div.className = 'slot' + (owned?' owned':'') + (p.sel===id?' sel':'') + ((!owned&&!afford)?' cant':'');
    div.title = w.name + ' — ' + w.desc;
    div.innerHTML = `<div class="ic">${w.icon}</div><div class="nm">${w.name}</div>`
      + (owned ? (w.free?'<div class="inf">∞</div>':'<div class="px">Eid</div>')
               : `<div class="px">${w.price} kr</div>`);
    div.addEventListener('click', () => {
      if (owned) engine.selectWeapon(null, id);
      else engine.buyWeapon(null, id);
    });
    hbSlots.appendChild(div);
  }
}
function syncShop(p){
  const W = engine.WEAPONS, ORDER = engine.WEAPON_ORDER;
  const tt = document.getElementById('shop-title');
  tt.textContent = '🛒 ' + p.name + ' — Våpenbutikk'; tt.style.color = p.col;
  document.getElementById('shop-money').textContent = p.money + ' kr';
  const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
  for (const id of ORDER){
    const w = W[id], owned = p.owned.has(id), afford = p.money >= w.price;
    const c = document.createElement('div');
    c.className = 'shop-card' + (owned?' owned':'') + (p.sel===id?' sel':'') + ((!owned&&!afford)?' cant':'');
    c.innerHTML = `<div class="ic">${w.icon}</div><div class="nm">${w.name}</div>`
      + `<div class="de">${w.desc}</div>`
      + `<div class="px">${owned?(w.free?'∞ gratis':'✓ Eid')+(p.sel===id?' · valgt':''):w.price+' kr'}</div>`;
    c.addEventListener('click', () => {
      if (owned) engine.selectWeapon(null, id);
      else engine.buyWeapon(null, id);
    });
    grid.appendChild(c);
  }
}

/* ---------- Game over ---------- */
function gameOver(winnerTeam){
  const players = engine.getPlayers();
  const winner = (winnerTeam!=null) ? players.find(p => p.team===winnerTeam && true) : null;
  document.getElementById('go-emoji').textContent = winner ? '🏆' : '🤝';
  const tt = document.getElementById('go-title');
  tt.textContent = winner ? winner.name + ' vant!' : 'Uavgjort!';
  tt.style.color = winner ? winner.col : '#fff';
  const survivor = players.find(p => p.team===winnerTeam && p.alive);
  document.getElementById('go-sub').textContent = winner
    ? ('Knuste motstanderen med ' + (survivor?survivor.lives:winner.lives) + ' ❤ igjen.')
    : 'Begge falt samtidig.';
  document.getElementById('gameover').classList.remove('hidden');
}

/* ---------- Local input ---------- */
function mpos(e){ const r = cv.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
function mposT(t){ const r = cv.getBoundingClientRect(); return { x:t.clientX-r.left, y:t.clientY-r.top }; }

window.addEventListener('keydown', e => {
  if (!engine) return;
  if (e.key === 'ArrowLeft') engine.localKey(-1, true);
  else if (e.key === 'ArrowRight') engine.localKey(1, true);
  else if (e.code === 'Space'){ e.preventDefault(); engine.spacePressed(); }
});
window.addEventListener('keyup', e => {
  if (!engine) return;
  if (e.key === 'ArrowLeft') engine.localKey(-1, false);
  else if (e.key === 'ArrowRight') engine.localKey(1, false);
});
cv.addEventListener('mousedown', e => { if (engine){ const m=mpos(e); engine.localMouse('down', m.x, m.y); } });
window.addEventListener('mousemove', e => { if (engine){ const m=mpos(e); engine.localMouse('move', m.x, m.y); } });
window.addEventListener('mouseup', () => { if (engine) engine.localMouse('up'); });
cv.addEventListener('touchstart', e => { e.preventDefault(); if(engine){ const m=mposT(e.touches[0]); engine.localMouse('down', m.x, m.y); } }, {passive:false});
cv.addEventListener('touchmove', e => { e.preventDefault(); if(engine){ const m=mposT(e.touches[0]); engine.localMouse('move', m.x, m.y); } }, {passive:false});
cv.addEventListener('touchend', e => { e.preventDefault(); if(engine) engine.localMouse('up'); }, {passive:false});

document.getElementById('shop-go').addEventListener('click', () => { if (engine) engine.closeShopToMove(); });
document.getElementById('go-again').addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
