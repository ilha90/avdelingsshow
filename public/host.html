<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Avdelingsshow — Host</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" />
<link rel="stylesheet" href="/tokens.css" />
<link rel="stylesheet" href="/style.css" />
<link rel="icon" type="image/svg+xml" href="/favicon.ico" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- Stage-bakgrunn (generativ canvas) -->
<canvas id="stage-bg" class="stage-bg"></canvas>

<!-- Password gate -->
<div id="pw-gate" class="pw-gate">
  <div class="pw-card">
    <h2>🔐 Host-innlogging</h2>
    <input id="pw-input" type="password" placeholder="Passord" autocomplete="off" />
    <button class="btn-primary" id="pw-submit">Logg inn</button>
    <div id="pw-error" style="color:var(--bad); font-size:13px;"></div>
  </div>
</div>

<div class="brand"><span class="dot"></span><span class="shine">Live Avdelingsshow</span></div>
<div class="topbar-right">
  <div id="phase-tag" class="phase-tag">lobby</div>
  <button class="icon-btn" id="btn-help" title="Hjelp">?</button>
  <button class="icon-btn" id="btn-fs" title="Fullskjerm">⛶</button>
  <button class="icon-btn" id="btn-mute" title="Lyd av/på">🔊</button>
</div>

<!-- Floating host-dock — alltid synlig, aldri dekket av overlays -->
<div id="host-dock" class="host-dock hidden">
  <button class="dock-btn dock-primary" id="dock-menu" title="Velg spill">
    <span class="dock-ic">🎮</span><span class="dock-lbl">Velg spill</span>
  </button>
  <button class="dock-btn" id="dock-ctx" title="Handling for gjeldende fase">
    <span class="dock-ic">⏭</span><span class="dock-lbl">Neste</span>
  </button>
  <button class="dock-btn dock-danger" id="dock-reset" title="Tilbake til lobby">
    <span class="dock-ic">↺</span><span class="dock-lbl">Lobby</span>
  </button>
</div>

<!-- Mascot — gameshow host -->
<div id="mascot" class="mascot mascot-gh" style="right: 40px; bottom: 40px;">
  <svg class="gh-svg" viewBox="0 0 220 340" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="suitGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7A2432"/>
        <stop offset="1" stop-color="#4A0E18"/>
      </linearGradient>
      <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FFD95A"/>
        <stop offset="1" stop-color="#D49820"/>
      </linearGradient>
      <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FFDEBE"/>
        <stop offset="1" stop-color="#EBBE92"/>
      </linearGradient>
    </defs>

    <!-- Bakskygge -->
    <ellipse cx="110" cy="325" rx="70" ry="7" fill="rgba(0,0,0,.35)"/>

    <!-- Høyre arm (peker fremover) -->
    <g class="gh-arm-right">
      <path d="M148 180 Q165 175 175 195 L185 225 Q183 235 172 232 L168 210 L155 200 Z" fill="url(#suitGrad)"/>
      <!-- Erme-cuff -->
      <rect x="165" y="228" width="22" height="6" fill="#2A0810" rx="3"/>
      <!-- Hånd med peker -->
      <circle cx="179" cy="238" r="11" fill="url(#skinGrad)" stroke="#A07050" stroke-width="1"/>
      <path d="M188 234 Q198 232 200 238 L196 244 Q190 246 187 243 Z" fill="url(#skinGrad)" stroke="#A07050" stroke-width="1"/>
    </g>

    <!-- Venstre arm med quiz-buzzer -->
    <g class="gh-arm-left">
      <path d="M72 180 Q55 175 48 195 L45 225 Q47 235 58 232 L62 210 L72 200 Z" fill="url(#suitGrad)"/>
      <rect x="42" y="228" width="22" height="6" fill="#2A0810" rx="3"/>
      <circle cx="53" cy="238" r="11" fill="url(#skinGrad)" stroke="#A07050" stroke-width="1"/>
      <!-- Buzzer -->
      <g transform="translate(28 195)">
        <rect x="0" y="0" width="30" height="48" fill="#1A1A1A" rx="5" stroke="#000" stroke-width="1"/>
        <circle cx="15" cy="12" r="7" fill="#E83040" stroke="#900" stroke-width="1"/>
        <rect x="4" y="24" width="8" height="7" fill="#FF4759" rx="1.5"/>
        <rect x="13" y="24" width="8" height="7" fill="#4784E1" rx="1.5"/>
        <rect x="22" y="24" width="5" height="7" fill="#FFB81C" rx="1.5"/>
        <rect x="4" y="34" width="8" height="7" fill="#47D197" rx="1.5"/>
        <rect x="13" y="34" width="8" height="7" fill="#7D7DD4" rx="1.5"/>
        <rect x="22" y="34" width="5" height="7" fill="#FF7633" rx="1.5"/>
      </g>
    </g>

    <!-- Torso (dressjakke) -->
    <path d="M62 180 Q52 290 90 300 L130 300 Q168 290 158 180 L140 175 L110 200 L80 175 Z" fill="url(#suitGrad)"/>
    <!-- Stripes -->
    <g stroke="#8B2F3D" stroke-width=".8" opacity=".55">
      <line x1="75" y1="195" x2="77" y2="290"/>
      <line x1="85" y1="198" x2="86" y2="290"/>
      <line x1="95" y1="200" x2="96" y2="290"/>
      <line x1="118" y1="200" x2="119" y2="290"/>
      <line x1="128" y1="198" x2="129" y2="290"/>
      <line x1="138" y1="195" x2="140" y2="290"/>
    </g>
    <!-- Lapels -->
    <path d="M92 182 L80 175 L110 202 Z" fill="#2A0810"/>
    <path d="M128 182 L140 175 L110 202 Z" fill="#2A0810"/>
    <!-- Slips -->
    <polygon points="105,202 115,202 118,255 102,255" fill="#4030A0"/>
    <polygon points="105,202 115,202 110,210" fill="#5040C0"/>
    <!-- Krave -->
    <path d="M100 200 L110 208 L120 200 L118 210 L102 210 Z" fill="#fff"/>
    <!-- Knapper -->
    <circle cx="110" cy="230" r="2.8" fill="#C03040" stroke="#701020" stroke-width=".6"/>
    <circle cx="110" cy="250" r="2.8" fill="#C03040" stroke="#701020" stroke-width=".6"/>
    <circle cx="110" cy="270" r="2.8" fill="#C03040" stroke="#701020" stroke-width=".6"/>

    <!-- Nakke -->
    <rect x="100" y="168" width="20" height="14" fill="url(#skinGrad)"/>

    <!-- Ører -->
    <ellipse cx="58" cy="120" rx="8" ry="10" fill="url(#skinGrad)" stroke="#A07050" stroke-width="1"/>
    <ellipse cx="162" cy="120" rx="8" ry="10" fill="url(#skinGrad)" stroke="#A07050" stroke-width="1"/>

    <!-- Hode -->
    <ellipse cx="110" cy="115" rx="52" ry="55" fill="url(#skinGrad)" stroke="#A07050" stroke-width="1"/>

    <!-- Hår (spiss blond) -->
    <path d="M60 90
             Q55 40 80 58
             Q82 22 100 48
             Q108 18 118 50
             Q128 22 140 50
             Q150 28 160 60
             Q170 55 160 95
             Q155 80 145 88
             Q140 65 130 78
             Q122 55 115 78
             Q108 60 100 80
             Q92 65 82 82
             Q75 72 68 90 Z"
          fill="url(#hairGrad)" stroke="#C08810" stroke-width="1"/>

    <!-- Briller -->
    <g class="gh-glasses">
      <rect x="72" y="106" width="30" height="22" rx="5" fill="rgba(180,220,255,.15)" stroke="#1a1a1a" stroke-width="2.5"/>
      <rect x="118" y="106" width="30" height="22" rx="5" fill="rgba(180,220,255,.15)" stroke="#1a1a1a" stroke-width="2.5"/>
      <line x1="102" y1="117" x2="118" y2="117" stroke="#1a1a1a" stroke-width="2.5"/>
    </g>

    <!-- Øyne -->
    <circle class="gh-eye" cx="87" cy="117" r="3.2" fill="#2A60B0"/>
    <circle class="gh-eye" cx="133" cy="117" r="3.2" fill="#2A60B0"/>

    <!-- Smil med tenner -->
    <g class="gh-mouth">
      <path d="M82 142 Q110 168 138 142 Q128 158 110 160 Q92 158 82 142 Z" fill="#8B2030"/>
      <rect x="90" y="144" width="40" height="9" fill="#fff" rx="1.5"/>
      <line x1="101" y1="145" x2="101" y2="152" stroke="#E0E0E0" stroke-width=".7"/>
      <line x1="110" y1="145" x2="110" y2="152" stroke="#E0E0E0" stroke-width=".7"/>
      <line x1="119" y1="145" x2="119" y2="152" stroke="#E0E0E0" stroke-width=".7"/>
    </g>

    <!-- Røde sko -->
    <ellipse cx="95" cy="305" rx="16" ry="5" fill="#C02A3A"/>
    <ellipse cx="125" cy="305" rx="16" ry="5" fill="#C02A3A"/>
  </svg>
  <div class="bubble" id="mascot-bubble">Hei!</div>
</div>

<!-- Main host view -->
<main id="host-main" class="host-main hidden">
  <!-- Left: QR + lobby config -->
  <aside class="panel">
    <div class="qr-box">
      <img id="qr-img" alt="QR" src="/qr" />
      <div class="url-chip" id="url-chip">...</div>
    </div>
    <h3>Innstillinger</h3>
    <label>Lag-modus <select id="cfg-teams"><option value="0">Av</option><option value="1">På</option></select></label>
    <button class="btn" id="btn-shuffle-teams" style="display:none">🔀 Stokk lag på nytt</button>
    <label>Antall spørsmål <select id="cfg-qcount"><option>5</option><option>8</option><option selected>10</option><option>12</option><option>15</option><option>20</option></select></label>
    <label>Tid per spørsmål (s) <select id="cfg-qtime"><option>10</option><option>15</option><option selected>20</option><option>30</option></select></label>
    <label>Tavle hver N <select id="cfg-lbevery"><option value="0">Av</option><option value="3" selected>3</option><option value="5">5</option><option value="10">10</option></select></label>
    <label>Lyn-runde tid (s) <select id="cfg-lighttime"><option>3</option><option selected>5</option><option>8</option><option>12</option><option>15</option></select></label>
    <label>Scatter-tid (s) <select id="cfg-scattertime"><option>30</option><option selected>60</option><option>90</option><option>120</option><option>180</option></select></label>
    <label>Lie-stemmetid (s) <select id="cfg-lietime"><option>15</option><option selected>30</option><option>60</option><option>90</option></select></label>
    <label>Snake-varighet (s) <select id="cfg-snaketime"><option>30</option><option>60</option><option selected>90</option><option>120</option><option>180</option><option>240</option><option value="0">∞</option></select></label>
    <label>Bomb-varighet (s) <select id="cfg-bombtime"><option>30</option><option>60</option><option>90</option><option selected>120</option><option>180</option><option>240</option><option>300</option><option value="0">∞</option></select></label>
  </aside>

  <!-- Center: state-driven -->
  <section id="center" class="panel">
    <div class="lobby-hero">
      <h2 class="lobby-hero-title">Klar for show?</h2>
      <p class="lobby-hero-sub">Skann QR-koden på telefonen for å bli med — velg et spill når alle er inne.</p>
    </div>
    <div class="center-actions">
      <button class="btn-primary btn-lg" id="btn-menu">🎮 Velg spill</button>
      <button class="btn btn-lg gold" id="btn-leaderboard">🏆 Topplisten</button>
      <button class="btn btn-lg danger" id="btn-reset">↺ Tilbake til lobby</button>
    </div>

    <details class="drawer">
      <summary>✨ AI-quiz — generer egne spørsmål</summary>
      <div class="drawer-body">
        <label>API-key <input id="ai-key" type="password" placeholder="sk-..." /></label>
        <label>Tema <input id="ai-topic" type="text" placeholder="f.eks. norsk fotball" /></label>
        <label>Antall <select id="ai-count"><option>3</option><option selected>5</option><option>8</option><option>10</option></select></label>
        <button class="btn gold" id="ai-gen">Generer</button>
        <small id="ai-status"></small>
      </div>
    </details>

    <details class="drawer">
      <summary>🗳️ Egne 'mest sannsynlig'-spørsmål</summary>
      <div class="drawer-body">
        <textarea id="mlp-input" rows="4" placeholder="Én linje per spørsmål, f.eks.:&#10;...glemmer kaffekoppen igjen&#10;...tar trappen i stedet for heisen"></textarea>
        <button class="btn" id="mlp-add">Legg til</button>
        <small id="mlp-status"></small>
      </div>
    </details>

    <div id="center-msg" class="center-msg">Venter på spillere...</div>
  </section>

  <!-- Right: players -->
  <aside class="panel">
    <h3>Spillere (<span id="p-count">0</span>)</h3>
    <div id="players" class="players"></div>
  </aside>
</main>

<!-- Game overlays are injected by host.js -->
<div id="overlays"></div>

<script type="module" src="/host.js"></script>
<script src="/socket.io/socket.io.js"></script>

</body>
</html>
